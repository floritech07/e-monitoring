version: '3.9'

# NexusMonitor v2 — Stack complète
# SBEE DSITD · Avril 2026
# Usage : docker compose up -d
#         docker compose logs -f backend
#         docker compose down -v   # détruire volumes

networks:
  nexus-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  postgres_data:
  redis_data:
  victoria_data:
  nginx_certs:

services:

  # ─────────────────────────────────────────────────────
  # PostgreSQL 16 — CMDB, ITIL incidents, audit trail
  # ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexusmonitor
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-NexusS3cure!2026}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      nexus-net:
        ipv4_address: 172.28.0.10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexusmonitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────
  # Redis 7 — Cache, sessions, pub/sub alertes
  # ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-RedisS3cure!2026}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      nexus-net:
        ipv4_address: 172.28.0.11
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-RedisS3cure!2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────
  # VictoriaMetrics — Time series (métriques SNMP/ESXi)
  # Alternative Prometheus : 5× moins de RAM, stockage compact
  # ─────────────────────────────────────────────────────
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.99.0
    container_name: nexus-victoria
    restart: unless-stopped
    command:
      - -storageDataPath=/storage
      - -retentionPeriod=90d
      - -httpListenAddr=:8428
      - -search.maxQueryLen=16384
      - -search.maxUniqueTimeseries=100000
    volumes:
      - victoria_data:/storage
    ports:
      - "127.0.0.1:8428:8428"
    networks:
      nexus-net:
        ipv4_address: 172.28.0.12
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8428/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────
  # Backend Node.js — API Express 5 + Socket.IO
  # ─────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nexus-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      # PostgreSQL
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: nexusmonitor
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-NexusS3cure!2026}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-RedisS3cure!2026}
      # VictoriaMetrics
      VICTORIA_URL: http://victoriametrics:8428
      # SNMP v3 — UPS Su-Kam
      SNMP_UPS_HOST: ${SNMP_UPS_HOST:-192.168.10.50}
      SNMP_UPS_USER: ${SNMP_UPS_USER:-nexusv3}
      SNMP_UPS_AUTH_KEY: ${SNMP_UPS_AUTH_KEY:-ChangeMe!Auth2026}
      SNMP_UPS_PRIV_KEY: ${SNMP_UPS_PRIV_KEY:-ChangeMe!Priv2026}
      # SNMP v3 — Switch HPE
      SNMP_SW_HOST: ${SNMP_SW_HOST:-192.168.10.1}
      SNMP_SW_USER: ${SNMP_SW_USER:-nexusv3}
      SNMP_SW_AUTH_KEY: ${SNMP_SW_AUTH_KEY:-ChangeMe!Auth2026}
      SNMP_SW_PRIV_KEY: ${SNMP_SW_PRIV_KEY:-ChangeMe!Priv2026}
      # Redfish — HPE iLO
      REDFISH_ESXi01_HOST: ${REDFISH_ESXi01_HOST:-192.168.10.11}
      REDFISH_ESXi01_USER: ${REDFISH_ESXi01_USER:-administrator}
      REDFISH_ESXi01_PASS: ${REDFISH_ESXi01_PASS:-ChangeMe!2026}
      # vCenter (Phase 2)
      VCENTER_HOST: ${VCENTER_HOST:-}
      VCENTER_USER: ${VCENTER_USER:-}
      VCENTER_PASS: ${VCENTER_PASS:-}
      # Email alertes
      SMTP_HOST: ${SMTP_HOST:-mail.sbee.bj}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-dsitd@sbee.bj}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-ChangeThisSecretInProduction!2026}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      nexus-net:
        ipv4_address: 172.28.0.20
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      victoriametrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────
  # Frontend Vite — React 19 (build statique servi par nginx)
  # ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost}
    container_name: nexus-frontend
    restart: unless-stopped
    networks:
      nexus-net:
        ipv4_address: 172.28.0.21

  # ─────────────────────────────────────────────────────
  # Nginx — Reverse proxy TLS + SPA routing
  # ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nexus-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_certs:/etc/letsencrypt
    networks:
      nexus-net:
        ipv4_address: 172.28.0.30
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────────────
  # SNMP Exporter — Collecteur SNMP → VictoriaMetrics
  # (Phase 1 : remplacé par snmpService.js natif Node.js)
  # ─────────────────────────────────────────────────────
  snmp-exporter:
    image: prom/snmp-exporter:v0.26.0
    container_name: nexus-snmp-exporter
    restart: unless-stopped
    command:
      - --config.file=/etc/snmp_exporter/snmp.yml
    volumes:
      - ./snmp/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    ports:
      - "127.0.0.1:9116:9116"
    networks:
      nexus-net:
        ipv4_address: 172.28.0.40
    profiles:
      - snmp-exporter  # désactivé par défaut, activer avec --profile snmp-exporter
