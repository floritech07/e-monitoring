<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .alert-card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; max-width: 600px; }
        .CRITICAL { border-top: 4px solid #ef4444; }
        .WARNING { border-top: 4px solid #f59e0b; }
        .RESOLVED { border-top: 4px solid #10b981; }
        .header { display: flex; align-items: center; justify-content: space-between; }
        .badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; color: white; }
        .badge.CRITICAL { background-color: #ef4444; }
        .badge.WARNING { background-color: #f59e0b; }
        .badge.RESOLVED { background-color: #10b981; }
        .metric-value { font-size: 24px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="alert-card {{ alert.severity }}">
        <div class="header">
            <h2>System Alert</h2>
            <span class="badge {{ alert.severity }}">{{ alert.severity }}</span>
        </div>
        <p><strong>Message:</strong> {{ alert.message }}</p>
        <p><strong>Asset ID:</strong> {{ alert.asset_id }}</p>
        <div class="metric-value">Trigger Value: {{ alert.value_at_trigger }}</div>
        <br/>
        <p><a href="https://nexusmonitor.local/problems">View in Problem Console</a></p>
    </div>
</body>
</html>
