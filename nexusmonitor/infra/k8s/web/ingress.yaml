apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexusmonitor-ingress
  namespace: nexusmonitor
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
  - host: nexusmonitor.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-service
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-service
            port:
              number: 80
