apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-deployment
  namespace: nexusmonitor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: nexusmonitor/worker:latest
        command: ["celery", "-A", "apps.worker.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        envFrom:
        - configMapRef:
            name: shared-config
