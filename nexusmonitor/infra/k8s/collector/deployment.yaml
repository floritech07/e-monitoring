apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector-deployment
  namespace: nexusmonitor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: collector
  template:
    metadata:
      labels:
        app: collector
    spec:
      containers:
      - name: collector
        image: nexusmonitor/collector:latest
        ports:
        - containerPort: 8001
        resources:
          requests:
            cpu: "200m"
            memory: "128Mi"
        envFrom:
        - configMapRef:
            name: shared-config
