name: Backend CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'apps/api/**'
      - 'apps/worker/**'
      - 'packages/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: nexusmonitor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov httpx
        
    - name: Run TruffleHog Secret Scanner
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD
        extra_args: --debug --only-verified

    - name: Environment Setup
      run: |
        echo "DATABASE_URL=postgresql+asyncpg://postgres:password@localhost:5432/nexusmonitor_test" >> $GITHUB_ENV
        echo "REDIS_URL=redis://localhost:6379/0" >> $GITHUB_ENV
        echo "MFA_SECRET=testsecret123" >> $GITHUB_ENV
        echo "JWT_SECRET=testjwtsecret" >> $GITHUB_ENV

    - name: Run Pytest Coverage
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        pytest --cov=apps/api --cov=packages --cov-report=xml
        
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
