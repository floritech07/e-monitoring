name: Frontend CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'apps/web/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: apps/web

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: apps/web/package-lock.json || apps/web/package.json
        
    - name: Install dependencies
      run: npm install
        
    - name: Type checking
      run: npm run typecheck
      
    - name: Lint
      run: npm run lint
      
    - name: Build
      run: npm run build
      
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: apps/web/dist
