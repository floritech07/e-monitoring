name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest
        pip install -r requirements.txt || echo "Ignoring for stub"
    - name: Lint with Ruff
      run: ruff check .
    - name: Test Python backend
      run: pytest .

  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker images
      run: |
        docker build -t nexusmonitor-api -f apps/api/Dockerfile .
        docker build -t nexusmonitor-worker -f apps/worker/Dockerfile .
        docker build -t nexusmonitor-collector -f apps/collector/Dockerfile .
