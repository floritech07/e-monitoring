name: Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 4 * * 1' # Weekly Monday at 4 AM

jobs:
  secrets_audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  dependency_audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Safety Python Scan
        run: |
          pip install safety
          safety check
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: NPM Audit
        working-directory: ./apps/web
        run: npm audit --audit-level=high
